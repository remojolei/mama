<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>open this</title>
    <style>
      .main-container {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Eto yung styling para sa button mo */
.open-btn {
    position: absolute;
    top: 60%; /* Gitna mula sa taas */
    left: 50%; /* Gitna mula sa kaliwa */
    transform: translate(-50%, -50%); /* Magic para saktong gitna talaga */
    padding: 15px 40px;
    background-color: #fdf5e6; /* Cream color base sa pic mo */
    color: #E75480; /* Red text */
    text-decoration: none;
    font-family: 'Indie Flower'; /* O kung anong font gamit mo */
    font-size: 1.5rem;
    font-weight: bold;
    border-radius: 50px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    border: none;
    cursor: pointer;
    z-index: 100;
    transition: 0.3s;
}

.open-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
    background-color: white;
}
    </style>
</head>
<body>
  <div class="main-container">
    <!-- Eto yung background image mo na nakita ko sa picture -->
    <img src="ma.jpg" style="width: 100%; max-width: 600px; display: block;">

    <!-- Eto yung button na gitnang-gitna -->
    <a href="ma.html" class="open-btn">OPEN THIS</a>
</div>
</body>
</html>
