<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>open this</title>
    <style>
      .main-container {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.open-btn {
    position: absolute;
    top: 55%; /* Inadjust ko nang konti para hindi matakpan yung text */
    left: 50%;
    transform: translate(-50%, -50%);
    
    padding: 12px 30px; /* Mas maliit na padding */
    background-color: #fffaf0; 
    color: #e07a9b; /* Pinkish red match sa bow */
    text-decoration: none;
    font-family: 'Indie Flower', cursive;
    font-size: 1.3rem; /* Tamang laki sa laptop */
    font-weight: bold;
    border-radius: 40px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    border: 2px solid #f38ba0;
    z-index: 100;
    transition: 0.3s;
    text-align: center;
    white-space: nowrap;
}

/* ✅ DESIGN PARA SA PHONE (MOBILE FIX) */
@media (max-width: 600px) {
    .open-btn {
        padding: 8px 20px; /* Mas maliit na padding sa phone */
        font-size: 1rem;    /* Mas maliit na font */
        top: 60%;          /* Babaan natin nang konti para kitang-kita yung "I love you Mama" */
        border-radius: 30px;
    }
}

.open-btn:hover {
    transform: translate(-50%, -50%) scale(1.05);
    background-color: white;
    </style>
</head>
<body>
  <div class="main-container">
    <!-- Eto yung background image mo na nakita ko sa picture -->
    <img src="ma.jpg" style="width: 100%; max-width: 600px; display: block;">

    <!-- Eto yung button na gitnang-gitna -->
    <a href="ma.html" class="open-btn">OPEN THIS</a>
</div>
</body>
</html>
